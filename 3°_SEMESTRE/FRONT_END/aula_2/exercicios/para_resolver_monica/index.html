<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="src/styles/style.css">
    <title>TechFood - Cardápio Digital</title>
</head>
<body>
    <header class="header">
        <h2 class="logo">TechFood</h2>
        <nav>
        <div class="search-icon">🔍</div> 
        <div class="cart-icon">🛒</div>
        </nav>
  </header>

  <main>
    <div class="banner-hero">
        <h1>Sabor & Saber</h1>
        <p>A melhor gastronomia tecnológica da região.</p>
    </div>
        <section class="menu-container">
            <div class="abas-lista">
            <input type="radio" name="categoria" id="massa" checked>
            <label for="massa">Massas</label>

            <input type="radio" name="categoria" id="bebida">
            <label for="bebida">Bebidas</label>

            <input type="radio" name="categoria" id="doce">
            <label for="doce">Doces</label>     
        </section>
<section class="aba-tela" id="tela-massas">
            <section class="grid-produtos">
                <article class="card" Esse card apresenta uma foto da lasanha, uma breve descrição e um botão para compra>
                    <img src="src/images/lasanha.jpg" alt="Imagem de uma lasanha bolonhesa com queijo por cima">
                    <h3>Lasanha Tradicional</h3>
                    <p>Massa artesanal ao molho bolonhesa com 4 queijos.</p>
                    <span class="preco">R$ 45,90</span>
                    <button onclick="alert('Adicionado')" aria-label="Realizar o pedido">Pedir</button>

                </article>

                <article class="card" aria-details = "Esse card apresenta uma foto do ravioli, uma breve descrição e um botão para compra">
                    <img src="src/images/ravioli.jpg" alt="Prato branco com ravioles ao molho vermelho">
                    <h3>Ravioli de Espinafre</h3>
                    <p>Recheado com ricota fresca e nozes picadas.</p>
                    <span class="preco">R$ 39,00</span>
                    <button onclick="alert('Adicionado')" aria-label="Realizar o pedido">Pedir</button>
                </article>
            </section>
        </section>
</main>


    <footer class="rodape">
        <p>Siga-nos: <a href="#">FB</a> <a href="#">IG</a></p>
    </footer>
</body>
</html>
